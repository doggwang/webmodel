<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SketchUp Web Viewer - 上传页面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .upload-zone { 
            border: 2px dashed #cbd5e1; 
            transition: all 0.3s;
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color: #f97316;
            background: #fff7ed;
        }
        .upload-zone.drag-over {
            border-color: #3b82f6;
            background: #dbeafe;
        }
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f97316, #fb923c);
            transition: width 0.3s;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-2xl mx-4">
        <!-- 页面标题 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-orange-500 mb-2">上传模型</h1>
            <p class="text-gray-500">支持 .skp 格式，自动转换为 glTF/Draco 压缩格式</p>
        </div>

        <!-- 上传区域 -->
        <div id="upload-zone" class="upload-zone bg-white rounded-2xl p-12 text-center cursor-pointer">
            <div class="space-y-4">
                <!-- 图标 -->
                <div class="flex justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 2M6 20a2 2 0 11-4 0 2 2 0 014 0zm12 0a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                </div>
                
                <!-- 提示文字 -->
                <div>
                    <p class="text-lg font-semibold text-gray-700 mb-2">拖拽文件到这里，或点击选择文件</p>
                    <p class="text-sm text-gray-500">支持 .skp 格式，最大 500MB</p>
                </div>

                <!-- 文件选择按钮 -->
                <div class="flex justify-center">
                    <button class="bg-orange-500 hover:bg-orange-600 text-white font-semibold px-6 py-3 rounded-lg transition-colors">
                        选择文件
                    </button>
                </div>
            </div>
        </div>

        <!-- 上传进度区域（默认隐藏） -->
        <div id="upload-progress" class="hidden mt-6 bg-white rounded-2xl p-6 shadow-sm">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-orange-100 rounded-lg flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                    <div>
                        <p class="font-semibold text-gray-800">我的客厅.skp</p>
                        <p class="text-sm text-gray-500">125.6 MB</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-bold text-orange-500">67%</p>
                    <p class="text-sm text-gray-500">预计剩余 2 分钟</p>
                </div>
            </div>
            
            <!-- 进度条 -->
            <div class="progress-bar">
                <div class="progress-fill" style="width: 67%"></div>
            </div>
        </div>

        <!-- 上传成功区域（默认隐藏） -->
        <div id="upload-success" class="hidden mt-6 bg-white rounded-2xl p-6 shadow-sm border-2 border-green-200">
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <div class="flex-1">
                    <p class="font-bold text-gray-800 mb-1">上传成功！</p>
                    <p class="text-sm text-gray-500">模型已转换为 glTF 格式，正在生成分享链接...</p>
                </div>
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-orange-500"></div>
            </div>
            <div class="mt-4 bg-orange-50 rounded-lg p-3">
                <div class="flex items-start space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange-500 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="text-xs text-orange-700">提示：转换完成后，您将自动跳转到分享页面，可以立即分享给客户查看。</p>
                </div>
            </div>
        </div>

        <!-- 错误提示区域（默认隐藏） -->
        <div id="upload-error" class="hidden mt-6 bg-red-50 rounded-2xl p-6 border-2 border-red-200">
            <div class="flex items-start space-x-4">
                <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div class="flex-1">
                    <p class="font-bold text-red-700 mb-1">上传失败</p>
                    <p class="text-sm text-red-600 mb-3">文件格式不支持，请上传 .skp 格式的文件</p>
                    <button class="bg-red-500 hover:bg-red-600 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors">
                        重新选择
                    </button>
                </div>
            </div>
        </div>

        <!-- 文件大小限制提示 -->
        <div class="mt-6 text-center">
            <p class="text-xs text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                文件大小限制：最大 500MB，超过限制将无法上传
            </p>
        </div>
    </div>

    <script>
        // 模拟上传交互
        const uploadZone = document.getElementById('upload-zone');
        const uploadProgress = document.getElementById('upload-progress');
        const uploadSuccess = document.getElementById('upload-success');
        const uploadError = document.getElementById('upload-error');

        // 拖拽效果
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('drag-over');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            // 模拟开始上传
            uploadZone.classList.add('hidden');
            uploadProgress.classList.remove('hidden');
            
            // 模拟上传进度
            setTimeout(() => {
                uploadProgress.classList.add('hidden');
                uploadSuccess.classList.remove('hidden');
            }, 3000);
        });

        // 点击选择文件
        uploadZone.addEventListener('click', () => {
            // 模拟选择文件
            uploadZone.classList.add('hidden');
            uploadProgress.classList.remove('hidden');
            
            // 模拟上传进度
            setTimeout(() => {
                uploadProgress.classList.add('hidden');
                uploadSuccess.classList.remove('hidden');
            }, 3000);
        });

        // 模拟错误情况（点击错误提示的重新选择按钮）
        uploadError.querySelector('button').addEventListener('click', () => {
            uploadError.classList.add('hidden');
            uploadZone.classList.remove('hidden');
        });
    </script>
</body>
</html>
