<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SketchUp Web Viewer - 分享页面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .qr-code {
            width: 150px;
            height: 150px;
            background: white;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-2xl mx-4">
        <!-- 成功提示 -->
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
            </div>
            <h1 class="text-3xl font-black text-gray-800 mb-2">模型已准备就绪！</h1>
            <p class="text-gray-500">您的模型已成功转换，现在可以分享给客户查看了</p>
        </div>

        <!-- 分享链接卡片 -->
        <div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
            <h3 class="font-bold text-gray-800 mb-4">分享链接</h3>
            
            <!-- 链接输入框 -->
            <div class="flex space-x-3 mb-4">
                <input type="text" value="https://su-web.app/view/abc123xyz" 
                       class="flex-1 px-4 py-3 border border-gray-300 rounded-lg bg-gray-50 text-gray-600" 
                       readonly>
                <button id="copy-btn" class="bg-orange-500 hover:bg-orange-600 text-white font-semibold px-6 py-3 rounded-lg transition-colors flex items-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                    <span>复制链接</span>
                </button>
            </div>

            <!-- 复制成功提示 -->
            <div id="copy-success" class="hidden bg-green-50 text-green-700 px-4 py-2 rounded-lg text-sm text-center">
                ✓ 链接已复制到剪贴板
            </div>
        </div>

        <!-- 分享设置卡片 -->
        <div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
            <h3 class="font-bold text-gray-800 mb-4">分享设置</h3>
            
            <!-- 有效期设置 -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">有效期</label>
                <div class="grid grid-cols-4 gap-3">
                    <button class="有效期-btn px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium hover:border-orange-500 hover:text-orange-500 transition-colors">
                        1天
                    </button>
                    <button class="有效期-btn px-4 py-2 border-2 border-orange-500 bg-orange-50 text-orange-500 rounded-lg text-sm font-medium">
                        7天
                    </button>
                    <button class="有效期-btn px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium hover:border-orange-500 hover:text-orange-500 transition-colors">
                        30天
                    </button>
                    <button class="有效期-btn px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium hover:border-orange-500 hover:text-orange-500 transition-colors">
                        永久
                    </button>
                </div>
                <p class="text-xs text-gray-400 mt-2">推荐使用7天有效期，确保数据安全</p>
            </div>

            <!-- 密码设置 -->
            <div class="mb-4">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-medium text-gray-700">访问密码</label>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="password-toggle" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-orange-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-500"></div>
                    </label>
                </div>
                <input type="password" id="password-input" placeholder="设置访问密码（可选）" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50 text-gray-600" 
                       disabled>
            </div>
        </div>

        <!-- 二维码卡片 -->
        <div class="bg-white rounded-2xl p-6 shadow-sm">
            <h3 class="font-bold text-gray-800 mb-4">扫码访问</h3>
            
            <div class="flex items-center space-x-6">
                <!-- 二维码 -->
                <div class="qr-code flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-full h-full" viewBox="0 0 100 100">
                        <rect x="10" y="10" width="30" height="30" fill="#000"/>
                        <rect x="60" y="10" width="30" height="30" fill="#000"/>
                        <rect x="10" y="60" width="30" height="30" fill="#000"/>
                        <rect x="15" y="15" width="20" height="20" fill="#fff"/>
                        <rect x="65" y="15" width="20" height="20" fill="#fff"/>
                        <rect x="15" y="65" width="20" height="20" fill="#fff"/>
                        <rect x="20" y="20" width="10" height="10" fill="#000"/>
                        <rect x="70" y="20" width="10" height="10" fill="#000"/>
                        <rect x="20" y="70" width="10" height="10" fill="#000"/>
                        <rect x="45" y="10" width="10" height="10" fill="#000"/>
                        <rect x="45" y="25" width="10" height="10" fill="#000"/>
                        <rect x="45" y="40" width="10" height="10" fill="#000"/>
                        <rect x="45" y="55" width="10" height="10" fill="#000"/>
                        <rect x="45" y="70" width="10" height="10" fill="#000"/>
                        <rect x="45" y="85" width="10" height="10" fill="#000"/>
                        <rect x="60" y="45" width="10" height="10" fill="#000"/>
                        <rect x="75" y="45" width="10" height="10" fill="#000"/>
                        <rect x="60" y="60" width="10" height="10" fill="#000"/>
                        <rect x="75" y="60" width="10" height="10" fill="#000"/>
                        <rect x="60" y="75" width="10" height="10" fill="#000"/>
                        <rect x="75" y="75" width="10" height="10" fill="#000"/>
                    </svg>
                </div>
                
                <!-- 说明文字 -->
                <div class="flex-1">
                    <p class="text-gray-700 mb-2">使用手机扫描二维码，即可在移动端查看 3D 模型</p>
                    <p class="text-sm text-gray-500">支持 iOS 和 Android 设备</p>
                    <button class="mt-4 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                        下载二维码
                    </button>
                </div>
            </div>
        </div>

        <!-- 底部操作按钮 -->
        <div class="mt-8 flex space-x-4">
            <button class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-lg transition-colors">
                查看模型
            </button>
            <button class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 rounded-lg transition-colors">
                上传新模型
            </button>
        </div>
    </div>

    <script>
        // 复制链接功能
        const copyBtn = document.getElementById('copy-btn');
        const copySuccess = document.getElementById('copy-success');
        
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText('https://su-web.app/view/abc123xyz');
            copySuccess.classList.remove('hidden');
            setTimeout(() => {
                copySuccess.classList.add('hidden');
            }, 2000);
        });

        // 有效期切换
        const validityBtns = document.querySelectorAll('.有效期-btn');
        validityBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                validityBtns.forEach(b => {
                    b.classList.remove('border-2', 'border-orange-500', 'bg-orange-50', 'text-orange-500');
                    b.classList.add('border', 'border-gray-300');
                });
                btn.classList.remove('border', 'border-gray-300');
                btn.classList.add('border-2', 'border-orange-500', 'bg-orange-50', 'text-orange-500');
            });
        });

        // 密码开关
        const passwordToggle = document.getElementById('password-toggle');
        const passwordInput = document.getElementById('password-input');
        
        passwordToggle.addEventListener('change', () => {
            passwordInput.disabled = !passwordToggle.checked;
            if (passwordToggle.checked) {
                passwordInput.focus();
            }
        });
    </script>
</body>
</html>
